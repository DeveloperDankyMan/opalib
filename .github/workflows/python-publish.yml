# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  push:
      branches:
        - main
  release:
    types: [published]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      version-type: ${{ steps.detect.outputs.version-type }}
      should-bump: ${{ steps.detect.outputs.should-bump }}
      new-version: ${{ steps.detect.outputs.new-version }}
      current-version: ${{ steps.detect.outputs.current-version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous commit
        id: prev-commit
        run: |
          PREV_COMMIT=${{ github.event.before }} # PREV_COMMIT=$(git rev-parse HEAD~1 || echo "HEAD")
          echo "prev-commit=$PREV_COMMIT" >> $GITHUB_OUTPUT

      - name: Get file changes
        id: files
        run: |
          ADDED=$(git diff --name-only --diff-filter=A ${{ steps.prev-commit.outputs.prev-commit }} HEAD 2>/dev/null || echo "")
          MODIFIED=$(git diff --name-only --diff-filter=M ${{ steps.prev-commit.outputs.prev-commit }} HEAD 2>/dev/null || echo "")
          DELETED=$(git diff --name-only --diff-filter=D ${{ steps.prev-commit.outputs.prev-commit }} HEAD 2>/dev/null || echo "")
          
          echo "added<<EOF" >> $GITHUB_OUTPUT
          echo "$ADDED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "modified<<EOF" >> $GITHUB_OUTPUT
          echo "$MODIFIED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "deleted<<EOF" >> $GITHUB_OUTPUT
          echo "$DELETED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect version bump type
        id: detect
        run: |
          ADDED="${{ steps.files.outputs.added }}"
          MODIFIED="${{ steps.files.outputs.modified }}"
          DELETED="${{ steps.files.outputs.deleted }}"
          
          CURRENT_VERSION=$(grep -m1 'version = ' pyproject.toml | sed 's/version = "//' | sed 's/".*//')
          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          
          VERSION_TYPE="patch"
          SHOULD_BUMP="false"
          
          # Major: Core files deleted
          if echo "$DELETED" | grep -qE "(ollama_integration|ai\.py)"; then
            VERSION_TYPE="major"
            SHOULD_BUMP="true"
          # Minor: New Python modules
          elif echo "$ADDED" | grep -qE "src/opalib/.*\.py$"; then
            VERSION_TYPE="minor"
            SHOULD_BUMP="true"
          # Minor: API changes in core files
          elif echo "$MODIFIED" | grep -qE "(ollama_integration|ai\.py)"; then
            if git diff ${{ steps.prev-commit.outputs.prev-commit }} HEAD -- $MODIFIED | grep -qE "^\+.*def |^\-.*def "; then
              VERSION_TYPE="minor"
            else
              VERSION_TYPE="patch"
            fi
            SHOULD_BUMP="true"
          # Patch: Other Python files
          elif echo "$MODIFIED" | grep -qE "src/opalib/.*\.py$"; then
            VERSION_TYPE="patch"
            SHOULD_BUMP="true"
          fi
          
          if [ "$SHOULD_BUMP" = "true" ]; then
            if [ "$VERSION_TYPE" = "major" ]; then
              NEW_VERSION="$((MAJOR+1)).0.0"
            elif [ "$VERSION_TYPE" = "minor" ]; then
              NEW_VERSION="$MAJOR.$((MINOR+1)).0"
            else
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH+1))"
            fi
          else
            NEW_VERSION=$CURRENT_VERSION
          fi
          
          echo "version-type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "should-bump=$SHOULD_BUMP" >> $GITHUB_OUTPUT
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT

  bump-version:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.should-bump == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Update version in pyproject.toml
        env:
          NEW_VERSION: ${{ needs.detect-changes.outputs.new-version }}
          CURRENT_VERSION: ${{ needs.detect-changes.outputs.current-version }}
        run: |
          sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/g" pyproject.toml

      - name: Commit and push changes
        env:
          NEW_VERSION: ${{ needs.detect-changes.outputs.new-version }}
          VERSION_TYPE: ${{ needs.detect-changes.outputs.version-type }}
        run: |
          git add pyproject.toml
          git commit -m "chore(release): bump version to $NEW_VERSION ($VERSION_TYPE)"
          git push

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.detect-changes.outputs.new-version }}
          release_name: Release ${{ needs.detect-changes.outputs.new-version }}
          body: |
            ## Version ${{ needs.detect-changes.outputs.new-version }}
            **Bump Type**: ${{ needs.detect-changes.outputs.version-type }}
            
            Auto-detected and bumped version based on changes:
            - See commit history for detailed changes
          draft: false
          prerelease: false
          
  release-build:
    needs: bump-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          # NOTE: put your own distribution build steps here.
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
