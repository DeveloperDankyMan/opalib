name: Bump Version

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install bump-my-version

    - name: Determine Version Bump Type
      id: determine_bump
      run: |
        # Fetch the last commit message
        COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "Last commit: $COMMIT_MSG"
        
        # Determine bump type based on Conventional Commits format
        if echo "$COMMIT_MSG" | grep -qE "BREAKING CHANGE|!:"; then
          echo "bump_type=major" >> $GITHUB_OUTPUT
        elif echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?:"; then
          echo "bump_type=minor" >> $GITHUB_OUTPUT
        elif echo "$COMMIT_MSG" | grep -qE "^fix(\(.+\))?:|^refactor(\(.+\))?:"; then
          echo "bump_type=patch" >> $GITHUB_OUTPUT
        else
          echo "bump_type=none" >> $GITHUB_OUTPUT
        fi

    - name: Configure Git
      if: steps.determine_bump.outputs.bump_type != 'none'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"

    - name: Execute Version Bump
      if: steps.determine_bump.outputs.bump_type != 'none'
      run: |
        BUMP_TYPE="${{ steps.determine_bump.outputs.bump_type }}"
        echo "Bumping version by: $BUMP_TYPE"
        
        # Bump version, commit changes, and create a git tag
        bump-my-version bump $BUMP_TYPE --verbose

    - name: Push changes and tags
      if: steps.determine_bump.outputs.bump_type != 'none'
      run: |
        git push origin main --tags
